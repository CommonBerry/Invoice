name: Release Invoice

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Binary
        run: |
          mkdir -p dist
          bun build ./src/index.ts --compile --minify --outfile ./dist/invoice

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/invoice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
